<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Smart Trash Monitoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- LEAFLET -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <header>
    <h1>Smart Trash Monitoring</h1>
  </header>

  <section class="stats">
    <div class="card">
      <p>Jumlah Tong</p>
      <h2 id="count">0</h2>
    </div>
    <div class="card">
      <p>Rata-rata</p>
      <h2 id="avg">0%</h2>
    </div>
    <div class="card">
      <p>Status</p>
      <h2 id="safe">-</h2>
    </div>
  </section>

  <main>
    <div class="map-box">
      <h3>Map Lokasi</h3>
      <div id="map"></div>
    </div>

    <div class="list-box">
      <h3>Status Tong</h3>
      <div id="list"></div>
    </div>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
